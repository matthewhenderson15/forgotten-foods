<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donation Tracker</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background: #f2e8d9;
      color: #3b2410;
      padding: 2.5rem 1.5rem 3rem;
    }

    .tracker {
      max-width: 580px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      font-family: Georgia, serif;
      font-size: 28px;
      font-weight: normal;
      color: #3b2410;
      margin-bottom: 0.4rem;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 14px;
      color: #7a5c3a;
      margin-bottom: 1.75rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .amount {
      font-size: 52px;
      font-weight: normal;
      color: #3b2410;
      line-height: 1;
      margin-bottom: 4px;
    }

    .goal-label {
      font-size: 14px;
      color: #7a5c3a;
      margin-bottom: 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .goal-label strong {
      font-weight: 600;
      color: #3b2410;
    }

    .bar-track {
      height: 24px;
      background: #e0ccb0;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 0.6rem;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: #3b2410;
      border-radius: 12px;
      transition: width 1.2s ease;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #7a5c3a;
      margin-bottom: 2rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .divider {
      border: none;
      border-top: 1px solid #c9b08a;
      margin-bottom: 1.25rem;
    }

    .donors-title {
      font-size: 13px;
      color: #7a5c3a;
      margin-bottom: 0.75rem;
      text-align: left;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .donor-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      padding: 8px 0;
      border-bottom: 1px solid #e0ccb0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .donor-name {
      color: #3b2410;
    }

    .donor-amt {
      color: #7a5c3a;
      font-weight: 500;
    }

    .error {
      display: none;
      font-size: 13px;
      color: #a32d2d;
      text-align: center;
      margin-top: 1rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .last-updated {
      font-size: 11px;
      color: #c9b08a;
      text-align: center;
      margin-top: 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
  </style>
</head>

<body>

  <div class="tracker">

    <h1>Youth Community Fundraiser Tracker</h1>
    <p class="subtitle">Help us reach our $10,000 goal</p>

    <p class="amount" id="amount-display">Loading...</p>
    <p class="goal-label">raised of <strong>$10,000</strong> goal</p>

    <div class="bar-track">
      <div class="bar-fill" id="progress-bar"></div>
    </div>

    <div class="stats">
      <span id="pct-display">0% funded</span>
      <span id="remaining-display">$10,000 to go</span>
    </div>

    <hr class="divider" />

    <p class="donors-title">Recent donors</p>
    <div id="donors"></div>

    <p class="error" id="error-msg"></p>
    <p class="last-updated" id="last-updated"></p>

  </div>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTtxJ64yH9hE97lMUJ0KBKFz9GYIBy37ydgbo3byFQnw2BGlXOCSreOUjDY0vw191S8WH3D3aluH7_l/pub?gid=0&single=true&output=csv";
    const GOAL = 10000;

    async function loadDonations() {
      try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();
        const rows = text.trim().split("\n").slice(1);

        let total = 0;
        const donors = [];

        rows.forEach(row => {
          const cols = row.split(",");
          const name = (cols[0] || "").trim().replace(/^"|"$/g, "");
          const amt = parseFloat((cols[1] || "0").trim().replace(/^"|"$/g, ""));
          if (!isNaN(amt) && amt > 0) {
            total += amt;
            donors.push({ name: name || "Anonymous", amount: amt });
          }
        });

        const pct = Math.min((total / GOAL) * 100, 100);
        const remaining = Math.max(GOAL - total, 0);

        document.getElementById("amount-display").textContent =
          "$" + total.toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 0 });

        document.getElementById("pct-display").textContent =
          Math.round(pct) + "% funded";

        document.getElementById("remaining-display").textContent =
          "$" + remaining.toLocaleString("en-US") + " to go";

        setTimeout(() => {
          document.getElementById("progress-bar").style.width = pct + "%";
        }, 100);

        const donorsEl = document.getElementById("donors");
        donors.slice().reverse().forEach(d => {
          const row = document.createElement("div");
          row.className = "donor-row";
          row.innerHTML =
            `<span class="donor-name">${d.name}</span>` +
            `<span class="donor-amt">$${d.amount.toLocaleString("en-US")}</span>`;
          donorsEl.appendChild(row);
        });

        document.getElementById("last-updated").textContent =
          "Last updated: " + new Date().toLocaleTimeString();

      } catch (e) {
        const err = document.getElementById("error-msg");
        err.style.display = "block";
        err.textContent = "Could not load donation data. Make sure the sheet is published publicly as CSV.";
        document.getElementById("amount-display").textContent = "$0";
      }
    }

    loadDonations();
  </script>

</body>

</html>
