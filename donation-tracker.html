<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Donation Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: transparent;
    color: #2c2c2a;
    padding: 2rem 1rem;
  }

  .tracker {
    max-width: 560px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .label {
    font-size: 14px;
    color: #888780;
    margin-bottom: 4px;
  }

  .amount {
    font-size: 40px;
    font-weight: 500;
    color: #3b2410;
    line-height: 1.1;
  }

  .goal-label {
    font-size: 14px;
    color: #888780;
    margin-top: 4px;
  }

  .goal-label strong {
    font-weight: 500;
    color: #2c2c2a;
  }

  .bar-track {
    height: 28px;
    background: #f1efe8;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid #d3d1c7;
    margin-bottom: 0.75rem;
  }

  .bar-fill {
    height: 100%;
    width: 0%;
    background: #5a3e28;
    border-radius: 14px;
    transition: width 1.2s ease;
  }

  .stats {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #888780;
    margin-bottom: 1.5rem;
  }

  .donors-section {
    border-top: 1px solid #d3d1c7;
    padding-top: 1rem;
  }

  .donors-title {
    font-size: 13px;
    color: #888780;
    margin-bottom: 0.75rem;
  }

  .donor-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 7px 0;
    border-bottom: 1px solid #f1efe8;
  }

  .donor-name { color: #2c2c2a; }
  .donor-amt  { color: #888780; font-weight: 500; }

  .error {
    display: none;
    font-size: 13px;
    color: #a32d2d;
    text-align: center;
    margin-top: 1rem;
  }

  .last-updated {
    font-size: 11px;
    color: #b4b2a9;
    text-align: center;
    margin-top: 1.25rem;
  }
</style>
</head>
<body>

<div class="tracker">

  <div class="header">
    <p class="label">Community Fundraising Goal</p>
    <p class="amount" id="amount-display">Loading...</p>
    <p class="goal-label">raised of <strong>$10,000</strong> goal</p>
  </div>

  <div class="bar-track">
    <div class="bar-fill" id="progress-bar"></div>
  </div>

  <div class="stats">
    <span id="pct-display">0% funded</span>
    <span id="remaining-display">$10,000 to go</span>
  </div>

  <div class="donors-section">
    <p class="donors-title">Recent donors</p>
    <div id="donors"></div>
  </div>

  <p class="error" id="error-msg"></p>
  <p class="last-updated" id="last-updated"></p>

</div>

<script>
  const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTtxJ64yH9hE97lMUJ0KBKFz9GYIBy37ydgbo3byFQnw2BGlXOCSreOUjDY0vw191S8WH3D3aluH7_l/pub?gid=0&single=true&output=csv";
  const GOAL = 10000;

  async function loadDonations() {
    try {
      const res = await fetch(SHEET_URL);
      const text = await res.text();
      const rows = text.trim().split("\n").slice(1);

      let total = 0;
      const donors = [];

      rows.forEach(row => {
        const cols = row.split(",");
        const name = (cols[0] || "").trim().replace(/^"|"$/g, "");
        const amt  = parseFloat((cols[1] || "0").trim().replace(/^"|"$/g, ""));
        if (!isNaN(amt) && amt > 0) {
          total += amt;
          donors.push({ name: name || "Anonymous", amount: amt });
        }
      });

      const pct       = Math.min((total / GOAL) * 100, 100);
      const remaining = Math.max(GOAL - total, 0);

      document.getElementById("amount-display").textContent =
        "$" + total.toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 0 });

      document.getElementById("pct-display").textContent =
        Math.round(pct) + "% funded";

      document.getElementById("remaining-display").textContent =
        "$" + remaining.toLocaleString("en-US") + " to go";

      setTimeout(() => {
        document.getElementById("progress-bar").style.width = pct + "%";
      }, 100);

      const donorsEl = document.getElementById("donors");
      donors.slice().reverse().forEach(d => {
        const row = document.createElement("div");
        row.className = "donor-row";
        row.innerHTML =
          `<span class="donor-name">${d.name}</span>` +
          `<span class="donor-amt">$${d.amount.toLocaleString("en-US")}</span>`;
        donorsEl.appendChild(row);
      });

      document.getElementById("last-updated").textContent =
        "Last updated: " + new Date().toLocaleTimeString();

    } catch (e) {
      const err = document.getElementById("error-msg");
      err.style.display = "block";
      err.textContent = "Could not load donation data. Make sure the sheet is published publicly as CSV.";
      document.getElementById("amount-display").textContent = "$0";
    }
  }

  loadDonations();
</script>

</body>
</html>
